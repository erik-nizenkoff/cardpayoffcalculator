  <rect width="1200" height="630" fill="url(#bg)"/>
  <path d="M0 492 C180 444 265 530 420 486 C605 434 684 340 865 373 C1000 398 1070 464 1200 420 L1200 630 L0 630 Z" fill="#f5f8fc" opacity="0.16"/>
